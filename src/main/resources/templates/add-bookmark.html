<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Bookmark</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">

<div class="container">
    <h2>Add Bookmark</h2>

    <form th:action="@{/bookmarks/add}" th:object="${bookmark}" method="post">
        <div class="mb-3">
            <label class="form-label">Title</label>
            <input type="text" th:field="*{title}" class="form-control" placeholder="Enter title" required>
        </div>
        <div class="mb-3">
            <label class="form-label">URL</label>
            <input type="url" th:field="*{url}" class="form-control" placeholder="Enter URL" required>
        </div>
        <button type="submit" class="btn btn-success">Add</button>
        <a href="/bookmarks" class="btn btn-secondary">Cancel</a>
    </form>
</div>

</body>
</html>
