<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Bookmarks</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

<h3>Your Bookmarks</h3>

<form method="post" action="/bookmarks/add" class="mb-3">
    <input class="form-control mb-2" name="title" placeholder="Title" required>
    <input class="form-control mb-2" name="url" placeholder="URL" required>
    <button class="btn btn-primary">Add Bookmark</button>
</form>

<form method="get" action="/bookmarks" class="mb-3 d-flex">
    <input class="form-control me-2" name="q" placeholder="Search" th:value="${q}">
    <button class="btn btn-outline-secondary">Search</button>
</form>

<table class="table table-bordered">
    <tr>
        <th>Title</th>
        <th>URL</th>
        <th>Added</th>
        <th>Actions</th>
    </tr>
    <tr th:each="b : ${bookmarks.content}">
        <td th:text="${b.title}"></td>
        <td><a th:href="${b.url}" th:text="${b.url}" target="_blank"></a></td>
        <td th:text="${#temporals.format(b.createdAt, 'dd-MM-yyyy HH:mm')}"></td>
        <td>
            <a th:href="@{/bookmarks/edit/{id}(id=${b.id})}" class="btn btn-sm btn-warning">Edit</a>
            <form th:action="@{/bookmarks/delete/{id}(id=${b.id})}" method="post" style="display:inline">
                <button class="btn btn-sm btn-danger">Delete</button>
            </form>
        </td>
    </tr>
</table>

<nav>
    <ul class="pagination">
        <li class="page-item" th:classappend="${bookmarks.first}? 'disabled'">
            <a class="page-link" th:href="@{/bookmarks(page=${bookmarks.number-1}, q=${q})}">Prev</a>
        </li>
        <li class="page-item" th:classappend="${bookmarks.last}? 'disabled'">
            <a class="page-link" th:href="@{/bookmarks(page=${bookmarks.number+1}, q=${q})}">Next</a>
        </li>
    </ul>
</nav>

<a href="/logout" class="btn btn-secondary">Logout</a>


<div class="modal fade" id="limitModal">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header"><h5>Error</h5>
				<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
</div>
            <div class="modal-body">You can only add 5 bookmarks.</div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:if="${limitExceeded}">
    new bootstrap.Modal(document.getElementById('limitModal')).show();
</script>

</body>
</html>
