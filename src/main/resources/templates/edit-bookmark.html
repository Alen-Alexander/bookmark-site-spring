<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body class="container mt-4">

<h3>Edit Bookmark</h3>

<form method="post" action="/bookmarks/edit">
    <input type="hidden" name="id" th:value="${bookmark.id}">
    <input class="form-control mb-2" name="title" th:value="${bookmark.title}">
    <input class="form-control mb-2" name="url" th:value="${bookmark.url}">
    <button class="btn btn-primary">Save</button>
</form>

</body>
</html>
